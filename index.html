<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Động Anime Bí Mật Của Khang</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1c23;
            color: #eceff4;
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* BANNER PHÍA TRÊN */
        .navbar {
            background-color: #242734;
            padding: 15px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #00ffcc;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-title {
            color: #00ffcc;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .tag-bimat {
            background: #ff4757;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        /* KHU VỰC ĐĂNG NHẬP TRÊN WEB */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 28, 35, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        .login-box {
            background: #242734;
            padding: 40px;
            border-radius: 16px;
            border: 2px solid #00ffcc;
            box-shadow: 0 10px 40px rgba(0, 255, 204, 0.3);
            text-align: center;
            max-width: 380px;
            width: 90%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-box h2 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .login-box p {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            border-radius: 25px;
            border: 2px solid #4c566a;
            background: #1a1c23;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .login-box input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .login-box button {
            background: linear-gradient(135deg, #00ffcc, #00cc99);
            color: #1a1c23;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .login-box button:hover {
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
            transform: translateY(-2px);
        }

        .login-box button:active {
            transform: translateY(0);
        }

        #err-msg {
            color: #ff4757;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            font-weight: bold;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* KHO PHIM CHÍNH */
        .main-container {
            max-width: 950px;
            margin: 30px auto;
            padding: 0 20px;
            display: none;
        }

        .video-player-wrapper {
            position: relative;
            width: 100%;
            background-color: #000;
            border-radius: 16px;
            border: 3px solid #2e3440;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .video-player-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }

        .video-error {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            color: #ff4757;
            font-size: 18px;
            text-align: center;
            padding: 20px;
        }

        .anime-info {
            margin-bottom: 20px;
        }

        .anime-title {
            font-size: 26px;
            font-weight: bold;
            color: #fff;
            margin: 15px 0 8px 0;
            text-align: left;
        }

        .anime-sub {
            color: #a3be8c;
            font-size: 14px;
            text-align: left;
            font-weight: 500;
        }

        .section-title {
            color: #00ffcc;
            font-size: 18px;
            text-align: left;
            margin: 25px 0 15px 0;
            font-weight: bold;
        }

        hr {
            border: 1px solid #242734;
            margin: 25px 0;
        }

        .episode-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: flex-start;
        }

        .ep-btn {
            background-color: #2e3440;
            color: #d8dee9;
            border: 2px solid #4c566a;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .ep-btn:hover {
            background-color: rgba(0, 255, 204, 0.1);
            border-color: #00ffcc;
            color: #00ffcc;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2);
        }

        .ep-btn.active {
            background-color: #00ffcc;
            border-color: #00ffcc;
            color: #1a1c23;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
        }

        .ep-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            color: #00ffcc;
            margin: 20px 0;
            font-size: 18px;
        }

        .loading-spinner::after {
            content: "...";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ""; }
            40% { content: "."; }
            60% { content: ".."; }
            80%, 100% { content: "..."; }
        }

        @media (max-width: 768px) {
            .navbar-title {
                font-size: 18px;
            }

            .anime-title {
                font-size: 20px;
            }

            .login-box {
                max-width: 90%;
                padding: 30px 20px;
            }

            .episode-buttons {
                gap: 8px;
            }

            .ep-btn {
                padding: 10px 18px;
                font-size: 13px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h2>🔒 ANIME HUB SECURITY</h2>
            <p>Vui lòng nhập mã PIN thành viên</p>
            <input type="password" id="pin-input" placeholder="••••••••" onkeypress="handleKeyPress(event)" autocomplete="off">
            <button onclick="validatePin()">XÁC NHẬN MỞ KHÓA</button>
            <div id="err-msg">❌ Sai mã PIN rồi bạn ơi!</div>
        </div>
    </div>

    <div class="navbar">
        <div class="navbar-title">✨ KHANG ANIME HUB</div>
        <div class="tag-bimat">🔒 KHU VỰC KÍN</div>
    </div>

    <div class="main-container" id="anime-hub">
        <div class="video-player-wrapper" id="video-container">
            <video id="main-player" controls preload="auto" crossorigin="anonymous"></video>
        </div>

        <div class="loading-spinner" id="loading-spinner"></div>

        <div class="anime-info">
            <div class="anime-title" id="current-ep-title">Thanh Gươm Diệt Quỷ (Mùa 4) - Tập 01</div>
            <div class="anime-sub">🌸 Trạng thái: Hoàn thành Vietsub lồng tiếng | Kho phim siêu mượt không quảng cáo</div>
        </div>

        <hr>

        <div class="section-title">Danh Sách Tập Phim:</div>

        <div class="episode-buttons" id="ep-buttons-container">
            <!-- Buttons sẽ được tạo bởi JavaScript -->
        </div>
    </div>

    <script>
        // ===== CẤU HÌNH =====
        const PIN_CODE = 'khang2026';
        
        // Video URLs từ GitHub Releases
        const episodes = [
            { name: 'Tập 01', url: 'https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/tgdq-tap1.mp4' },
            { name: 'Tập 02', url: 'https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/tgdq-tap2.mp4' },
            { name: 'Tập 03', url: 'https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/tgdq-tap3.mp4' },
            { name: 'Tập 04', url: 'https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/tgdq-tap4.mp4' },
            { name: 'Tập 05', url: 'https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/tgdq-tap5.mp4' },
            { name: 'Tập 06', url: 'https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/tgdq-tap6.mp4' },
            { name: 'Tập 07', url: 'https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/tgdq-tap7.mp4' },
            { name: 'Tập 08', url: 'https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/tgdq-tap8.mp4' }
        ];

        // ===== HÀM XÁC THỰC PIN =====
        function validatePin() {
            const inputVal = document.getElementById('pin-input').value.trim();
            const errMsg = document.getElementById('err-msg');
            
            if (inputVal === PIN_CODE) {
                // PIN đúng
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('anime-hub').style.display = 'block';
                errMsg.style.display = 'none';
                document.getElementById('pin-input').value = '';
                
                // Tạo episode buttons
                createEpisodeButtons();
                
                // Load tập đầu tiên
                playEpisode(0);
            } else {
                // PIN sai
                errMsg.style.display = 'block';
                document.getElementById('pin-input').value = '';
                document.getElementById('pin-input').focus();
            }
        }

        // ===== HÀM HANDLE PHÍM ENTER =====
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                validatePin();
            }
        }

        // ===== TẠO EPISODE BUTTONS =====
        function createEpisodeButtons() {
            const container = document.getElementById('ep-buttons-container');
            container.innerHTML = '';

            episodes.forEach((ep, index) => {
                const button = document.createElement('button');
                button.className = 'ep-btn' + (index === 0 ? ' active' : '');
                button.textContent = ep.name;
                button.onclick = () => playEpisode(index);
                container.appendChild(button);
            });
        }

        // ===== PHÁT VIDEO TẬP =====
        function playEpisode(index) {
            if (index < 0 || index >= episodes.length) return;

            const episode = episodes[index];
            const player = document.getElementById('main-player');
            const container = document.getElementById('video-container');
            const spinner = document.getElementById('loading-spinner');

            // Cập nhật title
            document.getElementById('current-ep-title').textContent = 
                'Thanh Gươm Diệt Quỷ (Mùa 4) - ' + episode.name;

            // Cập nhật active button
            const buttons = document.querySelectorAll('.ep-btn');
            buttons.forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });

            // Kiểm tra xem URL có accessible không
            showLoading(true);
            
            // Thử load video
            player.src = episode.url;
            player.onloadeddata = () => {
                showLoading(false);
                player.play().catch(() => {
                    console.log('Auto-play bị block, user phải click play');
                });
            };
            
            player.onerror = () => {
                showLoading(false);
                showVideoError(`❌ Không thể load video tập ${episode.name}. Vui lòng kiểm tra hoặc thử lại.`);
            };

            player.load();
        }

        // ===== HIỂN THỊ LOADING =====
        function showLoading(show) {
            document.getElementById('loading-spinner').style.display = show ? 'block' : 'none';
        }

        // ===== HIỂN THỊ LỖI VIDEO =====
        function showVideoError(message) {
            const container = document.getElementById('video-container');
            const errorDiv = document.querySelector('.video-error');
            
            if (errorDiv) {
                errorDiv.textContent = message;
            } else {
                const newErrorDiv = document.createElement('div');
                newErrorDiv.className = 'video-error';
                newErrorDiv.textContent = message;
                container.innerHTML = '';
                container.appendChild(newErrorDiv);
            }
        }

        // ===== FOCUS VÀO INPUT KHI LOAD TRANG =====
        window.addEventListener('load', () => {
            document.getElementById('pin-input').focus();
        });
    </script>

</body>
</html>
