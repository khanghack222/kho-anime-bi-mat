<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Khang Anime Hub - Google Drive Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00ffcc;
            --primary-dark: #00cc99;
            --bg-dark: #101216;
            --bg-card: #171a21;
            --border: #232834;
            --text: #f0f3f5;
            --text-sub: #8f9cae;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding-bottom: 40px;
            overflow-x: hidden;
        }
        .navbar {
            background: rgba(23, 26, 33, 0.9);
            backdrop-filter: blur(12px);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0; z-index: 100;
        }
        .navbar-title {
            color: var(--primary);
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .tag-status {
            background: linear-gradient(135deg, #00ffcc, #00cc99);
            color: #000;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
        }
        .main-container {
            max-width: 1000px;
            margin: 25px auto;
            padding: 0 16px;
        }
        /* Player Box */
        .video-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            background-color: #000;
            position: relative;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
        .anime-info { margin: 20px 0; }
        .anime-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .anime-sub { color: var(--text-sub); font-size: 14px; }
        .section-title {
            color: var(--primary);
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            margin: 25px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-title::before { content: "⚡"; }
        .episode-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .ep-btn {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .ep-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }
        .ep-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
        }
        @media (max-width: 768px) {
            .anime-title { font-size: 20px; }
            .ep-btn { padding: 10px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="navbar-title">✨ KHANG ANIME HUB</div>
        <div class="tag-status">GOOGLE STREAM • BYPASS CORS</div>
    </div>

    <div class="main-container">
        <div class="video-wrapper" id="player-container">
            <iframe id="anime-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="anime-info">
            <div class="anime-title" id="current-ep-title">Đang tải tập phim...</div>
            <div class="anime-sub">🌸 Phát trực tiếp mượt mà từ Google Cloud Server</div>
        </div>

        <div class="section-title">Danh sách tập phim</div>
        <div class="episode-buttons" id="ep-buttons-container"></div>
    </div>

    <script>
        // Cấu hình ID video Google Drive 
        const episodes = [
            { name: 'Tập 01', driveId: '1fFjkZ0a1w-cm_Uv4bIWtutxtTuw3MFmz' },
            { name: 'Tập 02', driveId: 'ĐIỀN_ID_TẬP_2_VÀO_ĐÂY' },
            { name: 'Tập 03', driveId: 'ĐIỀN_ID_TẬP_3_VÀO_ĐÂY' }
        ];

        function convertDriveEmbedUrl(id) {
            // Chuyển sang link dạng preview giúp vượt qua kiểm tra CORS của trình duyệt
            return `https://drive.google.com/file/d/${id}/preview`;
        }

        function createButtons() {
            const container = document.getElementById('ep-buttons-container');
            container.innerHTML = '';
            episodes.forEach((ep, index) => {
                const btn = document.createElement('button');
                btn.className = 'ep-btn';
                btn.textContent = ep.name;
                btn.onclick = () => playEpisode(index);
                container.appendChild(btn);
            });
        }

        function playEpisode(index) {
            if (index < 0 || index >= episodes.length) return;

            const episode = episodes[index];
            document.getElementById('current-ep-title').textContent = "Thanh Gươm Diệt Quỷ (Mùa 4) - " + episode.name;

            const buttons = document.querySelectorAll('.ep-btn');
            buttons.forEach((btn, i) => btn.classList.toggle('active', i === index));

            localStorage.setItem('khang_anime_iframe_index', index);

            // Cập nhật link vào iframe
            const embedUrl = convertDriveEmbedUrl(episode.driveId);
            document.getElementById('anime-player').src = embedUrl;
        }

        document.addEventListener('DOMContentLoaded', () => {
            createButtons();
            const saved = localStorage.getItem('khang_anime_iframe_index');
            const initIndex = (saved !== null && parseInt(saved) < episodes.length) ? parseInt(saved) : 0;
            playEpisode(initIndex);
        });
    </script>
</body>
</html>
