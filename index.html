<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Động Anime Bí Mật Của Khang</title>
    <style>
        /* Phong cách tươi sáng, hiện đại kiểu Anime/Gaming */
        body {
            background-color: #1a1c23;
            color: #eceff4;
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 50px;
        }

        /* Thanh Topbar màu Xanh Mint */
        .navbar {
            background-color: #242734;
            padding: 15px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #00ffcc; /* Viền neon dạ quang */
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.1);
        }
        .navbar-title {
            color: #00ffcc;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .tag-bimat {
            background: #ff4757;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .main-container {
            max-width: 950px;
            margin: 30px auto;
            padding: 0 20px;
            display: none; /* Khóa cửa khi chưa nhập mã PIN */
        }

        /* Khung phát phim dùng thẻ video chuẩn HTML5 mượt đét */
        .video-player-wrapper {
            position: relative;
            width: 100%;
            background-color: #000;
            border-radius: 16px;
            border: 3px solid #2e3440;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            margin-bottom: 25px;
            overflow: hidden;
            aspect-ratio: 16/9; /* Tự động chuẩn tỉ lệ màn hình */
        }
        .video-player-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .anime-title {
            font-size: 26px;
            font-weight: bold;
            color: #fff;
            margin: 0 0 8px 0;
            text-align: left;
        }
        .anime-sub {
            color: #a3be8c; 
            font-size: 14px;
            margin-bottom: 30px;
            text-align: left;
            font-weight: 500;
        }

        .section-title {
            color: #00ffcc;
            font-size: 18px;
            text-align: left;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Khu vực chọn tập dạng nút Bong Bóng xếp mượt mà */
        .episode-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: flex-start;
        }

        .ep-btn {
            background-color: #2e3440;
            color: #d8dee9;
            border: 2px solid #4c566a;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px; /* Bo tròn xịn sò như bong bóng */
            transition: all 0.3s ease;
        }

        .ep-btn:hover {
            background-color: rgba(0, 255, 204, 0.1);
            border-color: #00ffcc;
            color: #00ffcc;
            transform: translateY(-3px); /* Nút tự nhô nhẹ lên */
        }
        
        .ep-btn.active {
            background-color: #00ffcc;
            border-color: #00ffcc;
            color: #1a1c23;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Hệ thống khóa cửa nhập PIN bảo mật -->
    <script>
        const MA_PIN_ANIME = "khang2026"; // Bạn đổi mật khẩu ở đây nhé

        let checkPin = prompt("Nhập mã PIN để mở khóa Động Anime:");
        if (checkPin === MA_PIN_ANIME) {
            window.onload = function() { document.getElementById('anime-hub').style.display = 'block'; }
        } else {
            alert("Sai mã PIN rồi fen ơi!");
            window.location.href = "https://www.google.com";
        }
    </script>

    <!-- Thanh NAVBAR phía trên đầu web -->
    <div class="navbar">
        <div class="navbar-title">✨ KHANG ANIME HUB</div>
        <div class="tag-bimat">🔒 KHU VỰC KÍN</div>
    </div>

    <!-- Nội dung chính rạp phim -->
    <div class="main-container" id="anime-hub">
        
        <!-- TRÌNH PHÁT VIDEO CHUẨN HTML5 -->
        <div class="video-player-wrapper">
            <!-- Mặc định khi vào web sẽ load Tập 1. Bạn dán link .mp4 lấy từ GitHub Releases vào src dưới đây -->
            <video id="main-player" src="DÁN_LINK_MP4_TẬP_1_VÀO_ĐÂY" controls preload="auto"></video>
        </div>

        <!-- Thông tin bộ phim -->
        <div class="anime-info">
            <div class="anime-title" id="current-ep-title">Thanh Gươm Diệt Quỷ (Mùa 4) - Tập 01</div>
            <div class="anime-sub">🌸 Trạng thái: Hoàn thành Vietsub lồng tiếng | Kho phim siêu mượt không quảng cáo</div>
        </div>

        <hr style="border: 1px solid #242734; margin: 25px 0;">

        <div class="section-title">Danh Sách Tập Phim:</div>
        
        <!-- Các nút bấm chọn tập -->
        <div class="episode-buttons">
            <!-- Khang chỉ cần copy link .mp4 từ GitHub Releases dán vào trong dấu nháy đơn đầu tiên của hàm changeAnime nhé -->
            <button class="ep-btn active" onclick="changeAnime('DÁN_LINK_MP4_TẬP_1_VÀO_ĐÂY', 'Tập 01', this)">Tập 01</button>
            <button class="ep-btn" onclick="changeAnime('DÁN_LINK_MP4_TẬP_2_VÀO_ĐÂY', 'Tập 02', this)">Tập 02</button>
            <button class="ep-btn" onclick="changeAnime('DÁN_LINK_MP4_TẬP_3_VÀO_ĐÂY', 'Tập 03', this)">Tập 03</button>
            <button class="ep-btn" onclick="changeAnime('DÁN_LINK_MP4_TẬP_6_VÀO_ĐÂY', 'Tập 06', this)">Tập 06</button>
        </div>

    </div>

    <script>
        // Hàm chuyển tập phim mượt mà cho file dạng .mp4 trực tiếp
        function changeAnime(linkMp4Direct, epNumber, buttonClicked) {
            let player = document.getElementById('main-player');
            
            player.src = linkMp4Direct; // Thay link video mới
            player.load();              // Tải lại trình phát
            player.play();              // Tự động phát luôn cho máu
            
            // Cập nhật chữ tiêu đề
            document.getElementById('current-ep-title').innerText = "Thanh Gươm Diệt Quỷ (Mùa 4) - " + epNumber;
            
            // Đổi nút active
            let allButtons = document.getElementsByClassName('ep-btn');
            for (let i = 0; i < allButtons.length; i++) {
                allButtons[i].classList.remove('active');
            }
            buttonClicked.classList.add('active');
        }
    </script>

</body>
</html>
