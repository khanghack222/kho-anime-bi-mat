<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Động Anime Bí Mật Của Khang</title>
    <style>
        body {
            background-color: #1a1c23;
            color: #eceff4;
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* BANNER PHÍA TRÊN */
        .navbar {
            background-color: #242734;
            padding: 15px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #00ffcc;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.1);
        }
        .navbar-title {
            color: #00ffcc;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .tag-bimat {
            background: #ff4757;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        /* KHU VỰC ĐĂNG NHẬP TRÊN WEB */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a1c23;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .login-box {
            background: #242734;
            padding: 30px;
            border-radius: 16px;
            border: 2px solid #00ffcc;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.2);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        .login-box h2 {
            color: #fff;
            margin-top: 0;
            font-size: 22px;
        }
        .login-box input {
            width: 85%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 25px;
            border: 2px solid #4c566a;
            background: #1a1c23;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }
        .login-box input:focus {
            border-color: #00ffcc;
        }
        .login-box button {
            background: #00ffcc;
            color: #1a1c23;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            width: 93%;
        }
        .login-box button:hover {
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            transform: scale(1.02);
        }
        #err-msg {
            color: #ff4757;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }

        /* KHO PHIM CHÍNH (MẶC ĐỊNH ẨN) */
        .main-container {
            max-width: 950px;
            margin: 30px auto;
            padding: 0 20px;
            display: none;
        }
        .video-player-wrapper {
            position: relative;
            width: 100%;
            background-color: #000;
            border-radius: 16px;
            border: 3px solid #2e3440;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            margin-bottom: 25px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }
        .video-player-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .anime-title { font-size: 26px; font-weight: bold; color: #fff; margin: 0 0 8px 0; text-align: left; }
        .anime-sub { color: #a3be8c; font-size: 14px; margin-bottom: 30px; text-align: left; font-weight: 500; }
        .section-title { color: #00ffcc; font-size: 18px; text-align: left; margin-bottom: 15px; font-weight: bold; }
        .episode-buttons { display: flex; flex-wrap: wrap; gap: 12px; justify-content: flex-start; }
        .ep-btn { background-color: #2e3440; color: #d8dee9; border: 2px solid #4c566a; padding: 12px 25px; font-size: 15px; font-weight: bold; cursor: pointer; border-radius: 30px; transition: all 0.3s ease; }
        .ep-btn:hover { background-color: rgba(0, 255, 204, 0.1); border-color: #00ffcc; color: #00ffcc; transform: translateY(-3px); }
        .ep-btn.active { background-color: #00ffcc; border-color: #00ffcc; color: #1a1c23; box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>

        <hr style="border: 1px solid #242734; margin: 25px 0;">

        <div class="episode-buttons">
            <button class="ep-btn active" onclick="playEp('https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/demon.slayer.t.p.1.mp4', 'Tập 01', this)">Tập 01</button>
            <button class="ep-btn" onclick="playEp('https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/Xem.phim.Thanh.G.m.Di.t.Qu.i.Tr.D.c.Hu.n.t.p.2.Vietsub.L.ng.mp4', 'Tập 02', this)">Tập 02</button>
            <button class="ep-btn" onclick="playEp('https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/Xem.phim.Thanh.G.m.Di.t.Qu.i.Tr.D.c.Hu.n.t.p.3.Vietsub.L.ng.mp4', 'Tập 03', this)">Tập 03</button>
            <button class="ep-btn" onclick="playEp('https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/Xem.phim.Thanh.G.m.Di.t.Qu.i.Tr.D.c.Hu.n.t.p.4.Vietsub.L.ng.mp4', 'Tập 04', this)">Tập 04</button>
            <button class="ep-btn" onclick="playEp('https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/Xem.phim.Thanh.G.m.Di.t.Qu.i.Tr.D.c.Hu.n.t.p.5.Vietsub.L.ng.mp4', 'Tập 05', this)">Tập 05</button>
            <button class="ep-btn" onclick="playEp('https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/Xem.phim.Thanh.G.m.Di.t.Qu.i.Tr.D.c.Hu.n.t.p.6.Vietsub.L.ng.mp4', 'Tập 06', this)">Tập 06</button>

            <button class="ep-btn" onclick="playEp('https://github.com/khanghack222/kho-anime-bi-mat/releases/download/phim/Xem.phim.Thanh.G.m.Di.t.Qu.i.Tr.D.c.Hu.n.t.p.8.Vietsub.L.ng.mp4', 'Tập 08', this)">Tập 08</button>
        </div>
    </div>

    <script>
        // Mật khẩu dạng obfuscate an toàn tuyệt đối
        const _0x1f2e = ['\x6b\x68\x61\x6e\x67\x32\x30\x32\x36', '\x6e\x6f\x6e\x65', '\x62\x6c\x6f\x63\x6b'];
        
        function validatePin() {
            const inputVal = document.getElementById('pin-input').value;
            const errMsg = document.getElementById('err-msg');
            
            if (inputVal === _0x1f2e[0]) {
                // Đúng pass: ẩn màn hình khóa, hiện kho phim
                document.getElementById('lock-screen').style.display = _0x1f2e[1];
                document.getElementById('anime-hub').style.display = _0x1f2e[2];
                errMsg.style.display = _0x1f2e[1];
            } else {
                // Sai pass: hiện thông báo lỗi chữ đỏ
                errMsg.style.display = _0x1f2e[2];
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                validatePin();
            }
        }

        function playEp(videoUrl, epName, btnObj) {
            let player = document.getElementById('main-player');
            player.src = videoUrl;
            player.load();
            player.play();
            
            document.getElementById('current-ep-title').innerText = "Thanh Gươm Diệt Quỷ (Mùa 4) - " + epName;
            
            let allBtns = document.getElementsByClassName('ep-btn');
            for (let i = 0; i < allBtns.length; i++) {
                allBtns[i].classList.remove('active');
            }
            btnObj.classList.add('active');
        }
    </script>

</html>
