name: Download Release Videos

on:
  workflow_dispatch:

jobs:
  download-videos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create videos folder
        run: mkdir -p videos
      
      - name: Download release videos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd videos
          gh release download phim -R khanghack222/kho-anime-bi-mat --clobber
      
      - name: Commit videos
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add videos/
          git commit -m "Add videos from release phim" || true
          git push
